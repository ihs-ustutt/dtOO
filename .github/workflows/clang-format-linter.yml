name: clang-format Linter
on: [push, pull_request]
jobs:
  formatting-check:
    name: Formatting Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: DoozyX/clang-format-lint-action@v0.20
      with:
        source: 'src'
        exclude: '^.*(pugg|RTree|tetgen).*$'
        extensions: 'h,cpp,c'
        clangFormatVersion: 18
